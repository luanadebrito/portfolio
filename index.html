<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio | Luana de Brito + Conexão Literária & Game Center</title>

    <!-- Fontes e ícones globais -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        /* ==========================================================
           1) ESTILOS DO PORTFÓLIO | LUANA DE BRITO (ORIGINAL, SEM ALTERAÇÃO)
           ========================================================== */
        :root {
            --bg-color: #FFB6C1; /* Fundo Rosa Bebê */
            --card-bg: #2D2D2D;
            --text-main: #FFFFFF;
            --accent: #FFB6C1; 
            --accent-hover: #f08080;
            --primary-font: 'Montserrat', sans-serif;
            --secondary-font: 'Open Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #2D2D2D; /* Texto geral escuro para ler no rosa */
            font-family: var(--secondary-font);
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navegação simples entre as seções (opcional) */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(255, 182, 193, 0.9);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .top-nav .nav-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: flex-start;
            font-weight: 600;
        }
        .top-nav a {
            color: #2D2D2D;
            text-decoration: none;
            background: white;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.08);
        }
        .top-nav a:hover { background: #fff3f6; }

        /* ======= Seção 1: Portfólio ======= */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        header.portfolio-header {
            text-align: center;
            padding: 120px 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1558494949-ef010cbdcc51?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            border-bottom: 5px solid rgba(255, 255, 255, 0.2);
            color: white;
            position: relative;
        }

        .nome-principal { 
            font-family: var(--primary-font);
            font-size: 4rem; 
            font-weight: 800;
            margin: 0;
            line-height: 1;
            background: linear-gradient(to right, #ffffff, #FFD1DC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            text-shadow: 0px 5px 15px rgba(0,0,0,0.5);
        }

        .cargo-ti { 
            font-family: var(--primary-font);
            font-weight: 600;
            font-size: 1.2rem; 
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 15px 0 10px 0;
            color: #FFB6C1; /* Rosa para brilhar no fundo escuro do header */
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }

        /* RETÂNGULO PEQUENO AJUSTADO */
        .subtitle { 
            font-size: 0.85rem;
            margin-top: 10px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 4px 18px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .about {
            background: var(--card-bg);
            color: white;
            padding: 35px;
            border-radius: 24px;
            margin: -40px auto 40px;
            max-width: 850px;
            border: 1px solid rgba(255,182,193, 0.3);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 2;
        }

        .about strong { color: var(--accent); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            color: white;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: white;
        }

        .icon {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        h3 { 
            font-family: var(--primary-font);
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .tags span {
            background: rgba(255, 182, 193, 0.1);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            border: 1px solid var(--accent);
            font-weight: 600;
            margin: 4px;
            display: inline-block;
        }
